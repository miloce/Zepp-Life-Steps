name: Build and Release PHP Package

on:
  push:
    tags:
      - 'v*' # 当推送带 v 前缀的标签时触发，例如 v1.0.0

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Next.js project and export static HTML
        run: |
          npm run build
        
      - name: Create PHP wrapper structure
        run: |
          mkdir -p php-build
          # 复制 export 生成的静态文件
          cp -r out/. php-build/
          cp -r public/. php-build/
          
          # 创建 PHP 入口文件
          cat > php-build/index.php << 'EOF'
          <?php
          // PHP 项目配置信息
          $config = [
            'api_base' => '/api',
            'version' => '<?php echo getenv("VERSION") ?: "1.0.0"; ?>',
          ];
          
          // 加载静态导出后的 HTML
          $nextJsPath = "./index.html";
          
          if (file_exists($nextJsPath)) {
            $content = file_get_contents($nextJsPath);
            // 在这里可以对 Next.js 输出内容进行修改
            echo $content;
          } else {
            echo "应用加载失败，请检查构建是否正确完成。";
          }
          ?>
          EOF
          
          # 创建简单的 PHP API 代理，允许 Next.js 应用访问 API
          mkdir -p php-build/api
          
          # 创建 .htaccess 文件支持无后缀访问
          cat > php-build/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /

              # 处理API请求 (没有后缀的URL重定向到相应的PHP文件)
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule ^api/([^/]+)/?$ api/$1.php [L,QSA]
          </IfModule>
          EOF
          
          # 创建API目录的.htaccess
          cat > php-build/api/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /api/

              # 处理API请求
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule ^([^/]+)/?$ $1.php [L,QSA]
          </IfModule>
          EOF
          
          cat > php-build/api/index.php << 'EOF'
          <?php
          header('Content-Type: application/json');
          
          // 根据请求路径进行路由分发
          $requestUri = $_SERVER['REQUEST_URI'] ?? '';
          $path = '';
          
          // 解析请求路径
          if (preg_match('/\/api\/([^\/\?]+)/', $requestUri, $matches)) {
              $path = $matches[1];
          }
          
          if ($path == 'update-steps') {
            include_once('update-steps.php');
          } else {
            http_response_code(404);
            echo json_encode(['error' => 'API endpoint not found']);
          }
          ?>
          EOF
          
          # 将 API 文件转换为 PHP 文件
          cp pages/api/ZeppLifeSteps.js php-build/api/ZeppLifeSteps.php
          cp pages/api/update-steps.js php-build/api/update-steps.php
          
          # 创建一个简单的 README
          cat > php-build/README.md << 'EOF'
          # Zepp Life 步数修改 PHP 版
          
          这是通过 GitHub Actions 自动构建的 PHP 版本，方便部署在支持 PHP 的服务器上。
          
          ## 使用方法
          
          1. 将整个文件夹上传到支持 PHP 的服务器
          2. 访问 index.php 文件
          3. 按照界面提示操作修改步数
          
          ## 技术说明
          
          该项目是基于 Next.js 构建的应用转换为 PHP 部署版本。
          EOF
          
      - name: Convert JS to PHP format
        run: |
          # 不再使用JS转换，而是直接创建PHP文件
          # 移除原来的JS转PHP文件
          rm -f php-build/api/update-steps.php
          rm -f php-build/api/ZeppLifeSteps.php
          
          # 创建ZeppLifeSteps.php文件
          cat > php-build/api/ZeppLifeSteps.php << 'EOF'
          <?php
          /**
           * Zepp Life API PHP实现
           */
          class ZeppLifeSteps {
              private $headers = [
                  'User-Agent' => 'Dalvik/2.1.0 (Linux; U; Android 9; MI 6 MIUI/20.6.18)',
                  'Content-Type' => 'application/x-www-form-urlencoded;charset=UTF-8'
              ];
              
              /**
               * 从重定向URL中提取code
               */
              private function getCode($location) {
                  $codePattern = '/access=([^&]+)/';
                  if (preg_match($codePattern, $location, $matches)) {
                      return $matches[1];
                  }
                  return null;
              }
              
              /**
               * 登录获取token
               */
              public function login($account, $password) {
                  try {
                      // 判断是手机号还是邮箱
                      $isPhone = preg_match('/^\+?\d+$/', $account);
                      
                      // 对于手机号，检查是否有+86前缀
                      if ($isPhone) {
                          if (!str_starts_with($account, '+86') && !str_starts_with($account, '86')) {
                              $account = '+86' . $account;
                          } else if (str_starts_with($account, '86') && !str_starts_with($account, '+')) {
                              $account = '+' . $account;
                          }
                      }
                      
                      // 第一步：获取access code
                      $url1 = "https://api-user.huami.com/registrations/{$account}/tokens";
                      $data1 = [
                          'client_id' => 'HuaMi',
                          'password' => $password,
                          'redirect_uri' => 'https://s3-us-west-2.amazonaws.com/hm-registration/successsignin.html',
                          'token' => 'access'
                      ];
                      
                      // 如果是手机号,添加phone_number字段
                      if ($isPhone) {
                          $data1['phone_number'] = $account;
                      }
                      
                      $ch = curl_init();
                      curl_setopt($ch, CURLOPT_URL, $url1);
                      curl_setopt($ch, CURLOPT_POST, 1);
                      curl_setopt($ch, CURLOPT_POSTFIELDS, http_build_query($data1));
                      curl_setopt($ch, CURLOPT_HTTPHEADER, [
                          'User-Agent: ' . $this->headers['User-Agent'],
                          'Content-Type: ' . $this->headers['Content-Type']
                      ]);
                      curl_setopt($ch, CURLOPT_HEADER, 1);
                      curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);
                      curl_setopt($ch, CURLOPT_FOLLOWLOCATION, 0);
                      
                      $response = curl_exec($ch);
                      $header_size = curl_getinfo($ch, CURLINFO_HEADER_SIZE);
                      $headers = substr($response, 0, $header_size);
                      curl_close($ch);
                      
                      // 从响应头获取Location
                      preg_match('/Location: ([^\r\n]+)/i', $headers, $matches);
                      if (!isset($matches[1])) {
                          throw new Exception('登录失败：未获取到重定向URL');
                      }
                      
                      $location = $matches[1];
                      $code = $this->getCode($location);
                      
                      if (!$code) {
                          throw new Exception('获取access code失败');
                      }
                      
                      // 第二步：获取login token
                      $url2 = 'https://account.huami.com/v2/client/login';
                      $data2 = [
                          'allow_registration' => 'false',
                          'app_name' => 'com.xiaomi.hm.health',
                          'app_version' => '6.3.5',
                          'code' => $code,
                          'country_code' => 'CN',
                          'device_id' => '2C8B4939-0CCD-4E94-8CBA-CB8EA6E613A1',
                          'device_model' => 'phone',
                          'dn' => 'api-user.huami.com%2Capi-mifit.huami.com%2Capp-analytics.huami.com',
                          'grant_type' => 'access_token',
                          'lang' => 'zh_CN',
                          'os_version' => '1.5.0',
                          'source' => 'com.xiaomi.hm.health',
                          'third_name' => $isPhone ? 'huami_phone' : 'email'
                      ];
                      
                      $ch = curl_init();
                      curl_setopt($ch, CURLOPT_URL, $url2);
                      curl_setopt($ch, CURLOPT_POST, 1);
                      curl_setopt($ch, CURLOPT_POSTFIELDS, http_build_query($data2));
                      curl_setopt($ch, CURLOPT_HTTPHEADER, [
                          'User-Agent: ' . $this->headers['User-Agent'],
                          'Content-Type: ' . $this->headers['Content-Type']
                      ]);
                      curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);
                      
                      $response = curl_exec($ch);
                      curl_close($ch);
                      
                      $responseData = json_decode($response, true);
                      
                      if (!isset($responseData['token_info'])) {
                          throw new Exception('登录失败：未获取到token信息');
                      }
                      
                      $loginToken = $responseData['token_info']['login_token'];
                      $userId = $responseData['token_info']['user_id'];
                      
                      if (!$loginToken || !$userId) {
                          throw new Exception('登录失败：token信息不完整');
                      }
                      
                      return [
                          'loginToken' => $loginToken,
                          'userId' => $userId
                      ];
                  } catch (Exception $error) {
                      throw $error;
                  }
              }
              
              /**
               * 获取app token
               */
              public function getAppToken($loginToken) {
                  try {
                      $url = "https://account-cn.huami.com/v1/client/app_tokens?app_name=com.xiaomi.hm.health&dn=api-user.huami.com%2Capi-mifit.huami.com%2Capp-analytics.huami.com&login_token={$loginToken}";
                      
                      $ch = curl_init();
                      curl_setopt($ch, CURLOPT_URL, $url);
                      curl_setopt($ch, CURLOPT_HTTPHEADER, [
                          'User-Agent: ' . $this->headers['User-Agent'],
                          'Content-Type: ' . $this->headers['Content-Type']
                      ]);
                      curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);
                      
                      $response = curl_exec($ch);
                      curl_close($ch);
                      
                      $responseData = json_decode($response, true);
                      
                      if (!isset($responseData['token_info'])) {
                          throw new Exception('获取appToken失败：未获取到token信息');
                      }
                      
                      $appToken = $responseData['token_info']['app_token'];
                      
                      if (!$appToken) {
                          throw new Exception('获取appToken失败：token信息不完整');
                      }
                      
                      return $appToken;
                  } catch (Exception $error) {
                      throw $error;
                  }
              }
              
              /**
               * 修改步数
               */
              public function updateSteps($loginToken, $appToken, $steps) {
                  try {
                      $today = date('Y-m-d');
                      
                      // 构建data_json
                      $dataJson = '忽略';
                      
                      $timestamp = round(microtime(true) * 1000);
                      $t = time();
                      
                      $url = "https://api-mifit-cn2.huami.com/v1/data/band_data.json?t={$timestamp}";
                      $data = "userid={$loginToken}&last_sync_data_time={$t}&device_type=0&last_deviceid=DA932FFFFE8816E7&data_json={$dataJson}";
                      
                      $ch = curl_init();
                      curl_setopt($ch, CURLOPT_URL, $url);
                      curl_setopt($ch, CURLOPT_POST, 1);
                      curl_setopt($ch, CURLOPT_POSTFIELDS, $data);
                      curl_setopt($ch, CURLOPT_HTTPHEADER, [
                          'User-Agent: ' . $this->headers['User-Agent'],
                          'Content-Type: ' . $this->headers['Content-Type'],
                          'apptoken: ' . $appToken
                      ]);
                      curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);
                      
                      $response = curl_exec($ch);
                      curl_close($ch);
                      
                      $responseData = json_decode($response, true);
                      
                      if (!isset($responseData['code']) || $responseData['code'] !== 1) {
                          throw new Exception('更新步数失败: ' . json_encode($responseData));
                      }
                      
                      return $responseData;
                  } catch (Exception $error) {
                      throw $error;
                  }
              }
          }
          EOF
          
          # 创建update-steps.php文件
          cat > php-build/api/update-steps.php << 'EOF'
          <?php
          /**
           * 更新步数API处理函数
           */
          
          // 引入ZeppLifeSteps类
          require_once('ZeppLifeSteps.php');
          
          /**
           * 处理请求函数
           */
          function handleRequest($req, $res) {
              // 设置响应头
              header('Content-Type: application/json');
              
              // 支持POST和GET
              $method = $_SERVER['REQUEST_METHOD'];
              if ($method !== 'POST' && $method !== 'GET') {
                  http_response_code(405);
                  echo json_encode(['success' => false, 'message' => '方法不允许']);
                  return;
              }
              
              try {
                  // 根据请求方法获取参数
                  if ($method === 'POST') {
                      $data = json_decode(file_get_contents('php://input'), true) ?: [];
                      $account = $data['account'] ?? '';
                      $password = $data['password'] ?? '';
                      $steps = $data['steps'] ?? 0;
                  } else {
                      $account = $_GET['account'] ?? '';
                      $password = $_GET['password'] ?? '';
                      $steps = isset($_GET['steps']) ? intval($_GET['steps']) : 0;
                  }
                  
                  if (empty($account) || empty($password)) {
                      http_response_code(400);
                      echo json_encode(['success' => false, 'message' => '账号和密码不能为空']);
                      return;
                  }
                  
                  // 设置默认步数
                  $targetSteps = $steps ?: mt_rand(20000, 30000);
                  error_log('目标步数: ' . $targetSteps);
                  
                  // 初始化ZeppLifeSteps工具类
                  $zeppLifeSteps = new ZeppLifeSteps();
                  
                  // 登录获取token
                  error_log('开始登录流程...');
                  $loginResult = $zeppLifeSteps->login($account, $password);
                  $loginToken = $loginResult['loginToken'];
                  $userId = $loginResult['userId'];
                  error_log('登录成功,获取到loginToken和userId');
                  
                  // 获取app token
                  error_log('开始获取appToken...');
                  $appToken = $zeppLifeSteps->getAppToken($loginToken);
                  error_log('获取appToken成功');
                  
                  // 修改步数
                  error_log('开始更新步数...');
                  $result = $zeppLifeSteps->updateSteps($loginToken, $appToken, $targetSteps);
                  error_log('步数更新结果: ' . json_encode($result));
                  
                  // 返回成功
                  $response = [
                      'success' => true,
                      'message' => "步数修改成功: {$targetSteps}",
                      'data' => $result
                  ];
                  echo json_encode($response);
              } catch (Exception $error) {
                  error_log('API处理失败: ' . $error->getMessage());
                  
                  http_response_code(500);
                  $response = [
                      'success' => false,
                      'message' => $error->getMessage() ?: '服务器内部错误'
                  ];
                  echo json_encode($response);
              }
          }
          
          // 如果是直接访问当前文件，则执行处理
          if (basename($_SERVER['SCRIPT_FILENAME']) == basename(__FILE__)) {
              handleRequest($_REQUEST, null);
          }
          EOF
          
      - name: Package the project
        run: |
          cd php-build
          zip -r ../zepp-life-steps-php.zip .
          cd ..
          
      - name: Create and Upload GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: zepp-life-steps-php.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 